apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
  labels:
    name: unmanage-olm-deployment
  name: unmanage-olm-deployment
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - patch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
  labels:
    name: unmanage-olm-deployment
  name: unmanage-olm-deployment
  namespace: cilium
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
  labels:
    name: unmanage-olm-deployment
  name: unmanage-olm-deployment
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: unmanage-olm-deployment
subjects:
  - kind: ServiceAccount
    name: unmanage-olm-deployment
    namespace: cilium
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    name: unmanage-olm-deployment
  name: unmanage-olm-deployment
  namespace: cilium
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        name: unmanage-olm-deployment
    spec:
      containers:
        - args:
            - |
              kubectl -n cilium label deploy clife-controller-manager argocd.argoproj.io/instance-
          command:
            - bash
            - -e
            - -c
          env:
            - name: HOME
              value: /home
          image: quay.io/appuio/oc:v4.21@sha256:84981acb5c9448946557ecf16d370603947928f6a215b548cfda52689d8c1fd3
          imagePullPolicy: IfNotPresent
          name: unmanage-olm-deployment
          ports: []
          stdin: false
          tty: false
          volumeMounts:
            - mountPath: /home
              name: home
          workingDir: /home
      imagePullSecrets: []
      initContainers: []
      restartPolicy: OnFailure
      serviceAccountName: unmanage-olm-deployment
      terminationGracePeriodSeconds: 30
      volumes:
        - emptyDir: {}
          name: home
