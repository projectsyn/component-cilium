apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations: {}
  labels:
    name: cilium-shadowrange
  name: cilium-shadowrange
spec:
  groups:
    - name: cilium-shadowrange.rules
      rules:
        - alert: CiliumShadowRangeNodeMissing
          annotations:
            description: |
              The cluster has had {{ $value }} matching infra nodes for the last 5m
              instead of the expected {{ query "count(kube_node_info)" }}.
              There was probably a node replaced but the shadow range was not updated.
            message: Number of nodes doesn't match shadow range count
          expr: sum by (instance) (max by (pod) (node_cpu_info{instance=~"infra-8344|infra-87c9|infra-eba2"}))
            != 3
          for: 5m
          labels:
            severity: critical
