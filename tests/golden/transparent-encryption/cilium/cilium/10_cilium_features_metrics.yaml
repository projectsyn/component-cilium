apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations: {}
  labels:
    name: cilium-features
  name: cilium-features
spec:
  groups:
    - name: cilium-feature-metrics.rules
      rules:
        - expr: vector(0)
          labels:
            feature: clustermesh
          record: cilium_features
        - expr: vector(0)
          labels:
            feature: egress-gateway
          record: cilium_features
        - expr: vector(1)
          labels:
            feature: transparent-encryption
          record: cilium_features
